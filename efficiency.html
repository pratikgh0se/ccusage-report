<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efficiency — ccusage Report</title>
  <!-- DATA:START --><!-- DATA:END -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --green: #00d4aa;
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: #2d3148;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px; position: sticky; top: 0; z-index: 100; }
    nav .logo { font-weight: 700; font-size: 1rem; color: var(--green); margin-right: auto; letter-spacing: -0.5px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; padding: 4px 0; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--green); border-bottom-color: var(--green); }
    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .verdict-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .verdict-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
    .verdict-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .verdict-card .value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
    .verdict-card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem; }
    .verdict-card.good .value { color: var(--green); }
    .verdict-card.bad .value { color: var(--red); }
    .verdict-card.watch .value { color: var(--amber); }
    .section { margin-bottom: 2.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .chart-wrap { position: relative; width: 100%; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } nav { gap: 1rem; padding: 0 1rem; } main { padding: 1rem; } }
    .narrative { background: var(--surface2); border-left: 3px solid var(--green); border-radius: 0 8px 8px 0; padding: 1rem 1.25rem; font-size: 0.9rem; line-height: 1.6; color: var(--text); margin-bottom: 1rem; }
    .narrative.warn { border-left-color: var(--amber); }
    .narrative.bad { border-left-color: var(--red); }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.6rem 0.75rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.7rem; font-weight: 600; }
    .badge.good { background: rgba(0,212,170,0.15); color: var(--green); }
    .badge.watch { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.bad { background: rgba(239,68,68,0.15); color: var(--red); }
    .no-data { color: var(--muted); font-size: 0.875rem; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">◈ ccusage</span>
    <a href="index.html">Overview</a>
    <a href="cost.html">Cost</a>
    <a href="models.html">Models</a>
    <a href="efficiency.html" class="active">Efficiency</a>
    <a href="patterns.html">Patterns</a>
    <a href="projects.html">Projects</a>
    <a href="optimizer.html">Optimizer</a>
    <a href="diagnostics.html">Diagnostics</a>
  </nav>
  <main>
    <div class="verdict-strip" id="eff-kpis"></div>

<div class="section">
  <div class="section-title">Daily Cache Hit Rate</div>
  <div class="card">
    <div id="eff-narrative-best" class="narrative" style="margin-bottom:1rem"></div>
    <div class="chart-wrap" style="height:220px"><canvas id="cacheRatioChart"></canvas></div>
  </div>
</div>

<div class="grid-3 section">
  <div>
    <div class="section-title">Cache Hit Rate</div>
    <div class="card" style="text-align:center"><canvas id="gaugeCache" width="200" height="140"></canvas><div id="gaugeCache-label" style="margin-top:0.5rem;font-size:0.8rem;color:var(--muted)"></div></div>
  </div>
  <div>
    <div class="section-title">Output / Input Ratio</div>
    <div class="card" style="text-align:center"><canvas id="gaugeOutput" width="200" height="140"></canvas><div id="gaugeOutput-label" style="margin-top:0.5rem;font-size:0.8rem;color:var(--muted)"></div></div>
  </div>
  <div>
    <div class="section-title">Cache Create Overhead</div>
    <div class="card" style="text-align:center"><canvas id="gaugeCreate" width="200" height="140"></canvas><div id="gaugeCreate-label" style="margin-top:0.5rem;font-size:0.8rem;color:var(--muted)"></div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">Daily Token Composition</div>
  <div class="card"><div class="chart-wrap" style="height:240px"><canvas id="tokenAreaChart"></canvas></div></div>
</div>
  </main>
  <script>
(function() {
  const D = window.CCUSAGE_DATA;
  if (!D) return;
  const pct = v => (v * 100).toFixed(1) + '%';
  const fmt = v => '$' + v.toFixed(2);

  const t = D.totals;
  const cacheHitRate = t.cacheReadTokens / t.totalTokens;
  const outputRatio = t.outputTokens / (t.inputTokens + t.cacheReadTokens + t.cacheCreationTokens);
  const createOverhead = t.cacheCreationTokens / t.totalTokens;
  const cacheSavings = (t.cacheReadTokens * 13.5) / 1_000_000;

  // KPIs
  document.getElementById('eff-kpis').innerHTML = [
    { label: 'Cache Hit Rate', value: pct(cacheHitRate), sub: 'of all tokens', cls: cacheHitRate > 0.8 ? 'good' : cacheHitRate > 0.6 ? 'watch' : 'bad' },
    { label: 'Estimated Cache Savings', value: fmt(cacheSavings), sub: 'vs no caching (Opus rate)', cls: 'good' },
    { label: 'Output / Input Ratio', value: (outputRatio).toFixed(3), sub: outputRatio > 0.05 ? 'healthy' : outputRatio > 0.02 ? 'watch' : 'low', cls: outputRatio > 0.05 ? 'good' : outputRatio > 0.02 ? 'watch' : 'bad' },
    { label: 'Cache Create Overhead', value: pct(createOverhead), sub: 'of total tokens', cls: createOverhead < 0.1 ? 'good' : 'watch' },
  ].map(k => `<div class="verdict-card ${k.cls}"><div class="label">${k.label}</div><div class="value">${k.value}</div><div class="sub">${k.sub}</div></div>`).join('');

  // Best/worst day narrative
  const dailyRatios = D.daily.map(d => ({ period: d.period, ratio: d.cacheReadTokens / d.totalTokens }));
  if (dailyRatios.length === 0) {
    document.getElementById('eff-narrative-best').textContent = 'No daily data available.';
  } else {
    const best = dailyRatios.reduce((a, b) => a.ratio > b.ratio ? a : b);
    const worst = dailyRatios.reduce((a, b) => a.ratio < b.ratio ? a : b);
    document.getElementById('eff-narrative-best').textContent =
      `Best cache day: ${best.period} at ${pct(best.ratio)} cache reads. Worst: ${worst.period} at ${pct(worst.ratio)}. Target: >80%.`;
  }

  // Cache ratio line chart
  const labels = D.daily.map(d => d.period.slice(5));
  const ratios = D.daily.map(d => (d.cacheReadTokens / d.totalTokens * 100));

  new Chart(document.getElementById('cacheRatioChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Cache Hit Rate %',
          data: ratios,
          borderColor: '#00d4aa',
          backgroundColor: 'rgba(0,212,170,0.08)',
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          pointBackgroundColor: ratios.map(r => r > 80 ? '#00d4aa' : r > 60 ? '#f59e0b' : '#ef4444'),
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        annotation: { /* target line noted in narrative */ }
      },
      scales: {
        x: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', maxTicksLimit: 15 } },
        y: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', callback: v => v + '%' }, min: 0, max: 100 }
      }
    }
  });

  // Gauge helper (half-donut using doughnut chart)
  function drawGauge(canvasId, labelId, value, label, thresholds) {
    const cls = value >= thresholds.good ? 'good' : value >= thresholds.watch ? 'watch' : 'bad';
    const color = cls === 'good' ? '#00d4aa' : cls === 'watch' ? '#f59e0b' : '#ef4444';
    const displayVal = (value * 100).toFixed(1) + '%';
    new Chart(document.getElementById(canvasId), {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [value, 1 - value],
          backgroundColor: [color, '#2d3148'],
          borderWidth: 0,
        }]
      },
      options: {
        rotation: -90, circumference: 180,
        cutout: '70%',
        responsive: false,
        plugins: {
          legend: { display: false },
          tooltip: { enabled: false },
        }
      },
      plugins: [{
        id: 'centerText',
        beforeDraw(chart) {
          const { ctx, chartArea: { top, bottom, left, right } } = chart;
          ctx.save();
          ctx.font = 'bold 20px sans-serif';
          ctx.fillStyle = color;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(displayVal, (left + right) / 2, bottom + 4);
          ctx.restore();
        }
      }]
    });
    document.getElementById(labelId).textContent = label;
  }

  drawGauge('gaugeCache', 'gaugeCache-label', cacheHitRate, 'cache reads / total tokens', { good: 0.8, watch: 0.6 });
  drawGauge('gaugeOutput', 'gaugeOutput-label', Math.min(outputRatio * 10, 1), 'output / (input + cache) — scaled ×10', { good: 0.5, watch: 0.2 });
  drawGauge('gaugeCreate', 'gaugeCreate-label', Math.min(createOverhead * 3, 1), 'cache create / total tokens — lower is better', { good: 0.33, watch: 0.6 });

  // Stacked area — token composition
  const inp = D.daily.map(d => d.inputTokens / 1000);
  const out = D.daily.map(d => d.outputTokens / 1000);
  const cr = D.daily.map(d => d.cacheReadTokens / 1000);
  const cc = D.daily.map(d => d.cacheCreationTokens / 1000);

  new Chart(document.getElementById('tokenAreaChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Input', data: inp, backgroundColor: 'rgba(99,102,241,0.6)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 0 },
        { label: 'Output', data: out, backgroundColor: 'rgba(0,212,170,0.6)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 0 },
        { label: 'Cache Create', data: cc, backgroundColor: 'rgba(245,158,11,0.5)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 0 },
        { label: 'Cache Read', data: cr, backgroundColor: 'rgba(100,116,139,0.4)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 0 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#64748b', boxWidth: 12 } } },
      scales: {
        x: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', maxTicksLimit: 15 } },
        y: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', callback: v => v + 'k' }, stacked: true }
      }
    }
  });
})();
  </script>
</body>
</html>
