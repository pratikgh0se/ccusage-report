<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overview — ccusage Report</title>
  <!-- DATA:START --><!-- DATA:END -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --green: #00d4aa;
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: #2d3148;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px; position: sticky; top: 0; z-index: 100; }
    nav .logo { font-weight: 700; font-size: 1rem; color: var(--green); margin-right: auto; letter-spacing: -0.5px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; padding: 4px 0; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--green); border-bottom-color: var(--green); }
    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .verdict-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .verdict-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
    .verdict-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .verdict-card .value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
    .verdict-card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem; }
    .verdict-card.good .value { color: var(--green); }
    .verdict-card.bad .value { color: var(--red); }
    .verdict-card.watch .value { color: var(--amber); }
    .section { margin-bottom: 2.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .chart-wrap { position: relative; width: 100%; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } nav { gap: 1rem; padding: 0 1rem; } main { padding: 1rem; } }
    .narrative { background: var(--surface2); border-left: 3px solid var(--green); border-radius: 0 8px 8px 0; padding: 1rem 1.25rem; font-size: 0.9rem; line-height: 1.6; color: var(--text); margin-bottom: 1rem; }
    .narrative.warn { border-left-color: var(--amber); }
    .narrative.bad { border-left-color: var(--red); }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.6rem 0.75rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.7rem; font-weight: 600; }
    .badge.good { background: rgba(0,212,170,0.15); color: var(--green); }
    .badge.watch { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.bad { background: rgba(239,68,68,0.15); color: var(--red); }
    .no-data { color: var(--muted); font-size: 0.875rem; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">◈ ccusage</span>
    <a href="index.html" class="active">Overview</a>
    <a href="cost.html">Cost</a>
    <a href="models.html">Models</a>
    <a href="efficiency.html">Efficiency</a>
    <a href="patterns.html">Patterns</a>
    <a href="projects.html">Projects</a>
    <a href="optimizer.html">Optimizer</a>
    <a href="diagnostics.html">Diagnostics</a>
  </nav>
  <main>
    <!-- verdict strip -->
    <div class="verdict-strip" id="kpi-strip"></div>

    <!-- monthly overview chart -->
    <div class="section">
      <div class="section-title">Monthly Spend</div>
      <div class="card">
        <div class="chart-wrap" style="height:220px">
          <canvas id="monthlyChart"></canvas>
        </div>
      </div>
    </div>

    <!-- good/bad/watch verdicts -->
    <div class="section">
      <div class="section-title">Health Check</div>
      <div class="grid-3" id="health-cards"></div>
    </div>

    <!-- nav teaser cards -->
    <div class="section">
      <div class="section-title">Explore</div>
      <div class="grid-2" id="nav-cards"></div>
    </div>
  </main>
  <script>
(function() {
  const D = window.CCUSAGE_DATA;
  if (!D) return;

  const fmt = v => '$' + v.toFixed(2);
  const pct = v => (v * 100).toFixed(1) + '%';

  // KPI calculations
  const totalCost = D.totals.totalCost;
  const days = D.daily.length;
  const avgDaily = totalCost / days;
  const maxDay = D.daily.reduce((a, b) => a.totalCost > b.totalCost ? a : b);
  const totalCacheRead = D.totals.cacheReadTokens;
  const totalTokens = D.totals.totalTokens;
  // Estimate cache savings: cache read tokens cost ~0.1x full input price
  // Opus input: $15/1M, cache read: $1.5/1M → savings = cacheReadTokens * (15-1.5)/1M
  const cacheSavingsEst = (D.totals.cacheReadTokens * 13.5) / 1_000_000;

  // KPI strip
  const strip = document.getElementById('kpi-strip');
  const kpis = [
    { label: 'Total Spend', value: fmt(totalCost), sub: `${days} days tracked`, cls: '' },
    { label: 'Avg Daily Cost', value: fmt(avgDaily), sub: 'all days', cls: avgDaily < 10 ? 'good' : avgDaily < 30 ? 'watch' : 'bad' },
    { label: 'Most Expensive Day', value: fmt(maxDay.totalCost), sub: maxDay.period, cls: maxDay.totalCost < 30 ? 'watch' : 'bad' },
    { label: 'Cache Savings Est.', value: fmt(cacheSavingsEst), sub: 'vs no caching (Opus rate)', cls: 'good' },
  ];
  strip.innerHTML = kpis.map(k => `
    <div class="verdict-card ${k.cls}">
      <div class="label">${k.label}</div>
      <div class="value">${k.value}</div>
      <div class="sub">${k.sub}</div>
    </div>`).join('');

  // Monthly chart
  const months = D.monthly;
  const monthLabels = months.map(m => m.period);
  const monthCosts = months.map(m => m.totalCost);
  const momPct = monthCosts.map((c, i) => i === 0 ? null : ((c - monthCosts[i-1]) / monthCosts[i-1] * 100).toFixed(0));

  new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: {
      labels: monthLabels,
      datasets: [{
        label: 'Cost ($)',
        data: monthCosts,
        backgroundColor: monthCosts.map(c => c > 300 ? 'rgba(239,68,68,0.7)' : c > 100 ? 'rgba(245,158,11,0.7)' : 'rgba(0,212,170,0.7)'),
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            afterLabel: ctx => {
              const i = ctx.dataIndex;
              return momPct[i] !== null ? `MoM: ${momPct[i] > 0 ? '+' : ''}${momPct[i]}%` : '';
            }
          }
        },
        annotation: { /* MoM labels handled via tooltip */ }
      },
      scales: {
        x: { grid: { color: '#2d3148' }, ticks: { color: '#64748b' } },
        y: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', callback: v => '$' + v } }
      }
    }
  });

  // Health cards
  const cacheHitRate = D.totals.cacheReadTokens / D.totals.totalTokens;
  const topModelCost = (() => {
    const acc = {};
    D.daily.forEach(d => d.modelBreakdowns.forEach(m => { acc[m.modelName] = (acc[m.modelName] || 0) + m.cost; }));
    const top = Object.entries(acc).sort((a,b) => b[1]-a[1])[0];
    return { name: top[0], share: top[1] / totalCost };
  })();
  const maxDayCost = maxDay.totalCost;

  const healthCards = [
    {
      title: 'Cache Efficiency',
      value: pct(cacheHitRate),
      detail: `${fmt(cacheSavingsEst)} estimated saved`,
      cls: cacheHitRate > 0.8 ? 'good' : cacheHitRate > 0.6 ? 'watch' : 'bad',
      verdict: cacheHitRate > 0.8 ? 'Good' : cacheHitRate > 0.6 ? 'Watch' : 'Bad',
    },
    {
      title: 'Peak Day Spike',
      value: fmt(maxDayCost),
      detail: `on ${maxDay.period}`,
      cls: maxDayCost < 10 ? 'good' : maxDayCost < 30 ? 'watch' : 'bad',
      verdict: maxDayCost < 10 ? 'Good' : maxDayCost < 30 ? 'Watch' : 'Bad',
    },
    {
      title: 'Model Concentration',
      value: pct(topModelCost.share),
      detail: `${topModelCost.name.replace('claude-','').replace('-20251001','')} dominates`,
      cls: topModelCost.share < 0.6 ? 'good' : topModelCost.share < 0.8 ? 'watch' : 'bad',
      verdict: topModelCost.share < 0.6 ? 'Good' : topModelCost.share < 0.8 ? 'Watch' : 'Bad',
    },
  ];
  document.getElementById('health-cards').innerHTML = healthCards.map(h => `
    <div class="card">
      <div class="section-title">${h.title} <span class="badge ${h.cls.toLowerCase()}">${h.verdict}</span></div>
      <div style="font-size:2rem;font-weight:700;color:var(--${h.cls === 'good' ? 'green' : h.cls === 'watch' ? 'amber' : 'red'});margin:0.5rem 0">${h.value}</div>
      <div style="font-size:0.8rem;color:var(--muted)">${h.detail}</div>
    </div>`).join('');

  // Nav teaser cards
  const jun = D.monthly.find(m => m.period === '2026-06');
  const may = D.monthly.find(m => m.period === '2026-05');
  const momJun = jun && may ? ((jun.totalCost - may.totalCost) / may.totalCost * 100).toFixed(0) : null;
  const teasers = [
    { href: 'cost.html', title: 'Cost Breakdown', teaser: momJun ? `June cost ${momJun > 0 ? '+' : ''}${momJun}% vs May. See why →` : 'Daily spend patterns and anomalies →' },
    { href: 'models.html', title: 'Model Usage', teaser: `${topModelCost.name.replace('claude-','').replace('-20251001','')} is ${pct(topModelCost.share)} of spend. Optimize? →` },
    { href: 'efficiency.html', title: 'Cache Efficiency', teaser: `Cache hit rate: ${pct(cacheHitRate)}. ${cacheHitRate > 0.8 ? 'Solid.' : 'Room to improve.'} →` },
    { href: 'patterns.html', title: 'Usage Patterns', teaser: 'When do you code most? See your rhythms →' },
  ];
  document.getElementById('nav-cards').innerHTML = teasers.map(t => `
    <a href="${t.href}" style="text-decoration:none">
      <div class="card" style="cursor:pointer;transition:border-color 0.15s" onmouseover="this.style.borderColor='#00d4aa'" onmouseout="this.style.borderColor='#2d3148'">
        <div style="font-weight:600;margin-bottom:0.4rem">${t.title}</div>
        <div style="font-size:0.875rem;color:var(--muted)">${t.teaser}</div>
      </div>
    </a>`).join('');
})();
  </script>
</body>
</html>
