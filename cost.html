<div class="section">
  <div class="section-title">Daily Cost + 7-Day Moving Average</div>

</div>

<div class="section">

  </div>
</div>

<div class="grid-2 section">
  <div>
    <div class="section-title">Session Cost Distribution</div>
    <div class="card">
      <div class="chart-wrap" style="height:220px"><canvas id="histChart"></canvas></div>
    </div>
  </div>
  <div>
    <div class="section-title">Top 5 Most Expensive Sessions</div>
    <div class="card" id="top-sessions"></div>
  </div>
</div>

  <script>
(function() {
  const D = window.CCUSAGE_DATA;
  if (!D) return;
  const fmt = v => '$' + v.toFixed(2);

  // KPIs
  const sorted = [...D.daily].sort((a,b) => b.totalCost - a.totalCost);
  const maxDay = sorted[0];
  const top3pct = sorted.slice(0,3).reduce((s,d) => s + d.totalCost, 0) / D.totals.totalCost;
  // Most expensive week
  const weeklyAgg = {};
  D.daily.forEach(d => {
    const dt = new Date(d.period + 'T00:00:00Z');
    const day = dt.getUTCDay(); // 0=Sun
    const startOfWeek = new Date(dt);
    startOfWeek.setUTCDate(dt.getUTCDate() - day);
    const wk = startOfWeek.toISOString().slice(0,10);
    weeklyAgg[wk] = (weeklyAgg[wk] || 0) + d.totalCost;
  });
  const maxWeek = Object.entries(weeklyAgg).sort((a,b) => b[1]-a[1])[0];

  document.getElementById('cost-kpis').innerHTML = [
    { label: 'Most Expensive Day', value: fmt(maxDay.totalCost), sub: maxDay.period, cls: 'bad' },
    { label: 'Most Expensive Week', value: fmt(maxWeek[1]), sub: `w/c ${maxWeek[0]}`, cls: 'watch' },
    { label: 'Top 3 Days Share', value: (top3pct*100).toFixed(0)+'%', sub: 'of total spend', cls: top3pct > 0.5 ? 'bad' : 'watch' },
    { label: 'Total Sessions', value: D.session.length, sub: `avg ${fmt(D.totals.totalCost/D.session.length)}/session`, cls: '' },
  ].map(k => `<div class="verdict-card ${k.cls}"><div class="label">${k.label}</div><div class="value">${k.value}</div><div class="sub">${k.sub}</div></div>`).join('');

  // Daily chart with 7-day MA
  const labels = D.daily.map(d => d.period.slice(5)); // MM-DD
  const costs = D.daily.map(d => d.totalCost);
  const ma7 = costs.map((_, i) => {
    if (i < 6) return null;
    return costs.slice(i-6, i+1).reduce((a,b) => a+b, 0) / 7;
  });
  const anomalyThreshold = costs.reduce((a,b) => a+b, 0) / costs.length * 2;

  new Chart(document.getElementById('dailyChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Daily Cost',
          data: costs,
          backgroundColor: costs.map(c => c > anomalyThreshold ? 'rgba(239,68,68,0.8)' : c > 30 ? 'rgba(245,158,11,0.7)' : 'rgba(0,212,170,0.5)'),
          borderRadius: 4, order: 2,
        },
        {
          label: '7-Day MA',
          data: ma7,
          type: 'line',
          borderColor: '#f59e0b',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.4,
          order: 1,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#64748b', boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: $${ctx.parsed.y?.toFixed(2) ?? ''}` } }
      },
      scales: {
        x: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', maxTicksLimit: 15 } },
        y: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', callback: v => '$'+v } }
      }
    }
  });

  // Stacked cost waterfall by component
  // Cost breakdown: approximate from token counts × known rates ($/1M tokens)
  // Rates: input $15, output $75, cache_create $18.75, cache_read $1.50 (Opus 4.7 rates)
  const RATES = { input: 15, output: 75, cacheCreate: 18.75, cacheRead: 1.5 };
  const componentCosts = D.daily.map(d => ({
    input: d.inputTokens * RATES.input / 1e6,
    output: d.outputTokens * RATES.output / 1e6,
    cacheCreate: d.cacheCreationTokens * RATES.cacheCreate / 1e6,
    cacheRead: d.cacheReadTokens * RATES.cacheRead / 1e6,
  }));

  new Chart(document.getElementById('waterfallChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Input', data: componentCosts.map(c => c.input), backgroundColor: 'rgba(99,102,241,0.7)', stack: 's' },
        { label: 'Output', data: componentCosts.map(c => c.output), backgroundColor: 'rgba(0,212,170,0.7)', stack: 's' },
        { label: 'Cache Create', data: componentCosts.map(c => c.cacheCreate), backgroundColor: 'rgba(245,158,11,0.7)', stack: 's' },
        { label: 'Cache Read', data: componentCosts.map(c => c.cacheRead), backgroundColor: 'rgba(100,116,139,0.5)', stack: 's' },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#64748b', boxWidth: 12 } } },
      scales: {
        x: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', maxTicksLimit: 15 }, stacked: true },
        y: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', callback: v => '$'+v }, stacked: true }
      }
    }
  });

  // Session histogram
  const buckets = [0, 1, 5, 20, Infinity];
  const bucketLabels = ['<$1', '$1–$5', '$5–$20', '>$20'];
  const bucketCounts = [0, 0, 0, 0];
  D.session.forEach(s => {
    const c = s.totalCost;
    const i = buckets.findIndex((b, idx) => c < buckets[idx+1]);
    if (i >= 0) bucketCounts[i]++;
  });

  new Chart(document.getElementById('histChart'), {
    type: 'bar',
    data: {
      labels: bucketLabels,
      datasets: [{ label: 'Sessions', data: bucketCounts, backgroundColor: ['rgba(0,212,170,0.7)','rgba(0,212,170,0.7)','rgba(245,158,11,0.7)','rgba(239,68,68,0.7)'], borderRadius: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#2d3148' }, ticks: { color: '#64748b' } },
        y: { grid: { color: '#2d3148' }, ticks: { color: '#64748b' } }
      }
    }
  });

  // Top 5 sessions
  const top5 = [...D.session].sort((a,b) => b.totalCost - a.totalCost).slice(0,5);
  document.getElementById('top-sessions').innerHTML = `<table>
    <thead><tr><th>Date</th><th>Model(s)</th><th>Cost</th></tr></thead>
    <tbody>${top5.map(s => {
      const date = s.metadata?.lastActivity?.slice(0,10) ?? '?';
      const models = s.modelsUsed.map(m => m.replace('claude-','').replace('-20251001','')).join(', ');
      return `<tr><td>${date}</td><td>${models}</td><td style="color:var(--red);font-weight:600">${fmt(s.totalCost)}</td></tr>`;
    }).join('')}</tbody>
  </table>`;
})();
  </script>
</body>
