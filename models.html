<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Models — ccusage Report</title>
  <!-- DATA:START --><!-- DATA:END -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --green: #00d4aa;
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: #2d3148;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px; position: sticky; top: 0; z-index: 100; }
    nav .logo { font-weight: 700; font-size: 1rem; color: var(--green); margin-right: auto; letter-spacing: -0.5px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; padding: 4px 0; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--green); border-bottom-color: var(--green); }
    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .verdict-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .verdict-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
    .verdict-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .verdict-card .value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
    .verdict-card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem; }
    .verdict-card.good .value { color: var(--green); }
    .verdict-card.bad .value { color: var(--red); }
    .verdict-card.watch .value { color: var(--amber); }
    .section { margin-bottom: 2.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .chart-wrap { position: relative; width: 100%; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } nav { gap: 1rem; padding: 0 1rem; } main { padding: 1rem; } }
    .narrative { background: var(--surface2); border-left: 3px solid var(--green); border-radius: 0 8px 8px 0; padding: 1rem 1.25rem; font-size: 0.9rem; line-height: 1.6; color: var(--text); margin-bottom: 1rem; }
    .narrative.warn { border-left-color: var(--amber); }
    .narrative.bad { border-left-color: var(--red); }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.6rem 0.75rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.7rem; font-weight: 600; }
    .badge.good { background: rgba(0,212,170,0.15); color: var(--green); }
    .badge.watch { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.bad { background: rgba(239,68,68,0.15); color: var(--red); }
    .no-data { color: var(--muted); font-size: 0.875rem; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">◈ ccusage</span>
    <a href="index.html">Overview</a>
    <a href="cost.html">Cost</a>
    <a href="models.html" class="active">Models</a>
    <a href="efficiency.html">Efficiency</a>
    <a href="patterns.html">Patterns</a>
    <a href="projects.html">Projects</a>
    <a href="optimizer.html">Optimizer</a>
    <a href="diagnostics.html">Diagnostics</a>
  </nav>
  <main>
    <div class="verdict-strip" id="model-kpis"></div>
<div class="narrative" id="model-narrative"></div>

<div class="grid-2 section">
  <div>
    <div class="section-title">Cost Share by Model</div>
    <div class="card"><div class="chart-wrap" style="height:260px"><canvas id="donutChart"></canvas></div></div>
  </div>
  <div>
    <div class="section-title">Cost per 1k Output Tokens</div>
    <div class="card" id="model-table"></div>
  </div>
</div>

<div class="section">
  <div class="section-title">Monthly Cost per Model</div>
  <div class="card"><div class="chart-wrap" style="height:220px"><canvas id="monthlyModelChart"></canvas></div></div>
</div>
  </main>
  <script>
(function() {
  const D = window.CCUSAGE_DATA;
  if (!D) return;
  const fmt = v => '$' + v.toFixed(2);
  const SHORT = m => m.replace('claude-','').replace('-20251001','').replace('claude-','');

  // Aggregate by model across all days
  const modelAgg = {};
  D.daily.forEach(d => {
    d.modelBreakdowns.forEach(m => {
      if (!modelAgg[m.modelName]) modelAgg[m.modelName] = { cost: 0, outputTokens: 0, inputTokens: 0, cacheReadTokens: 0 };
      modelAgg[m.modelName].cost += m.cost;
      modelAgg[m.modelName].outputTokens += m.outputTokens;
      modelAgg[m.modelName].inputTokens += m.inputTokens;
      modelAgg[m.modelName].cacheReadTokens += m.cacheReadTokens || 0;
    });
  });
  const models = Object.entries(modelAgg).sort((a,b) => b[1].cost - a[1].cost);
  const totalCost = D.totals.totalCost;
  const topModel = models[0];
  const cheapestModel = models[models.length - 1];

  // KPIs
  document.getElementById('model-kpis').innerHTML = [
    { label: 'Dominant Model', value: SHORT(topModel[0]), sub: fmt(topModel[1].cost) + ' spent', cls: '' },
    { label: 'Models Used', value: models.length, sub: 'across all sessions', cls: '' },
    { label: 'Top Model Share', value: (topModel[1].cost/totalCost*100).toFixed(0)+'%', sub: 'of total spend', cls: topModel[1].cost/totalCost < 0.6 ? 'good' : topModel[1].cost/totalCost < 0.8 ? 'watch' : 'bad' },
    { label: 'Cheapest Model', value: SHORT(cheapestModel[0]), sub: fmt(cheapestModel[1].cost) + ' total', cls: 'good' },
  ].map(k => `<div class="verdict-card ${k.cls}"><div class="label">${k.label}</div><div class="value">${k.value}</div><div class="sub">${k.sub}</div></div>`).join('');

  // Narrative: Opus vs Sonnet
  const opus = modelAgg['claude-opus-4-7'];
  const sonnet = modelAgg['claude-sonnet-4-6'];
  if (opus && sonnet && opus.outputTokens > 0) {
    const opusCostPer1k = opus.cost / (opus.outputTokens / 1000);
    const sonnetCostPer1k = sonnet.cost / (sonnet.outputTokens / 1000);
    const hypotheticalCost = opus.outputTokens / 1000 * sonnetCostPer1k;
    const savings = opus.cost - hypotheticalCost;
    document.getElementById('model-narrative').textContent =
      `You spent ${fmt(opus.cost)} on Opus for ${(opus.outputTokens/1000).toFixed(0)}k output tokens. At Sonnet's effective rate (${fmt(sonnetCostPer1k)}/1k out), the same output would cost ${fmt(hypotheticalCost)} — a potential saving of ${fmt(savings)}.`;
  } else {
    document.getElementById('model-narrative').textContent = 'Not enough multi-model data to compute Opus vs Sonnet comparison.';
  }

  // Donut chart
  const COLORS = ['rgba(239,68,68,0.8)','rgba(0,212,170,0.8)','rgba(245,158,11,0.8)','rgba(99,102,241,0.8)','rgba(100,116,139,0.8)'];
  new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: models.map(([n]) => SHORT(n)),
      datasets: [{ data: models.map(([,v]) => v.cost), backgroundColor: COLORS, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#64748b', padding: 12, boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${fmt(ctx.parsed)} (${(ctx.parsed/totalCost*100).toFixed(1)}%)` } }
      }
    }
  });

  // Cost per 1k output tokens table
  const tableRows = models.map(([name, agg]) => {
    const cper1k = agg.outputTokens > 0 ? agg.cost / (agg.outputTokens / 1000) : 0;
    return { name: SHORT(name), cost: fmt(agg.cost), cper1k: fmt(cper1k), output: (agg.outputTokens/1000).toFixed(0)+'k' };
  });
  document.getElementById('model-table').innerHTML = `<table>
    <thead><tr><th>Model</th><th>Total Cost</th><th>$/1k output</th><th>Output Tokens</th></tr></thead>
    <tbody>${tableRows.map(r => `<tr><td style="font-weight:500">${r.name}</td><td>${r.cost}</td><td style="color:var(--amber)">${r.cper1k}</td><td style="color:var(--muted)">${r.output}</td></tr>`).join('')}</tbody>
  </table>`;

  // Monthly model breakdown grouped bar
  const allModelNames = [...new Set(D.monthly.flatMap(m => m.modelBreakdowns.map(mb => mb.modelName)))];
  const monthLabels = D.monthly.map(m => m.period);
  const datasets = allModelNames.map((name, i) => ({
    label: SHORT(name),
    data: D.monthly.map(month => {
      const mb = month.modelBreakdowns.find(m => m.modelName === name);
      return mb ? mb.cost : 0;
    }),
    backgroundColor: COLORS[i % COLORS.length],
    borderRadius: 4,
  }));

  new Chart(document.getElementById('monthlyModelChart'), {
    type: 'bar',
    data: { labels: monthLabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#64748b', boxWidth: 12 } } },
      scales: {
        x: { grid: { color: '#2d3148' }, ticks: { color: '#64748b' } },
        y: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', callback: v => '$'+v } }
      }
    }
  });
})();
  </script>
</body>
</html>
