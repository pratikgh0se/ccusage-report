<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patterns — ccusage Report</title>
  <!-- DATA:START --><!-- DATA:END -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #252836;
      --green: #00d4aa;
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: #2d3148;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 2rem; height: 56px; position: sticky; top: 0; z-index: 100; }
    nav .logo { font-weight: 700; font-size: 1rem; color: var(--green); margin-right: auto; letter-spacing: -0.5px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.875rem; font-weight: 500; padding: 4px 0; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--green); border-bottom-color: var(--green); }
    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .verdict-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .verdict-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
    .verdict-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .verdict-card .value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
    .verdict-card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem; }
    .verdict-card.good .value { color: var(--green); }
    .verdict-card.bad .value { color: var(--red); }
    .verdict-card.watch .value { color: var(--amber); }
    .section { margin-bottom: 2.5rem; }
    .section-title { font-size: 1rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .chart-wrap { position: relative; width: 100%; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } nav { gap: 1rem; padding: 0 1rem; } main { padding: 1rem; } }
    .narrative { background: var(--surface2); border-left: 3px solid var(--green); border-radius: 0 8px 8px 0; padding: 1rem 1.25rem; font-size: 0.9rem; line-height: 1.6; color: var(--text); margin-bottom: 1rem; }
    .narrative.warn { border-left-color: var(--amber); }
    .narrative.bad { border-left-color: var(--red); }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.6rem 0.75rem; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.7rem; font-weight: 600; }
    .badge.good { background: rgba(0,212,170,0.15); color: var(--green); }
    .badge.watch { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge.bad { background: rgba(239,68,68,0.15); color: var(--red); }
    .no-data { color: var(--muted); font-size: 0.875rem; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">◈ ccusage</span>
    <a href="index.html">Overview</a>
    <a href="cost.html">Cost</a>
    <a href="models.html">Models</a>
    <a href="efficiency.html">Efficiency</a>
    <a href="patterns.html" class="active">Patterns</a>
    <a href="projects.html">Projects</a>
    <a href="optimizer.html">Optimizer</a>
    <a href="diagnostics.html">Diagnostics</a>
  </nav>
  <main>
    <div class="verdict-strip" id="pat-kpis"></div>
<div class="narrative" id="pat-narrative"></div>

<div class="grid-2 section">
  <div>
    <div class="section-title">Cost by Day of Week</div>
    <div class="card"><div class="chart-wrap" style="height:220px"><canvas id="weekdayChart"></canvas></div></div>
  </div>
  <div>
    <div class="section-title">Sessions by Hour of Day</div>
    <div class="card"><div class="chart-wrap" style="height:220px"><canvas id="hourChart"></canvas></div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">Daily Cost Heatmap</div>
  <div class="card" id="heatmapContainer" style="overflow-x:auto"></div>
</div>

<div class="section">
  <div class="section-title">Session Cost vs Token Volume</div>
  <div class="card"><div class="chart-wrap" style="height:280px"><canvas id="scatterChart"></canvas></div></div>
</div>
  </main>
  <script>
(function() {
  const D = window.CCUSAGE_DATA;
  if (!D) return;
  const fmt = v => '$' + v.toFixed(2);
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Day of week aggregation from daily data
  const dowCost = Array(7).fill(0);
  const dowCount = Array(7).fill(0);
  D.daily.forEach(d => {
    const dt = new Date(d.period + 'T12:00:00Z');
    const dow = dt.getUTCDay();
    dowCost[dow] += d.totalCost;
    dowCount[dow]++;
  });
  const maxDow = dowCost.indexOf(Math.max(...dowCost));

  // Hour of day from session lastActivity
  const hourCount = Array(24).fill(0);
  D.session.forEach(s => {
    const ts = s.metadata?.lastActivity;
    if (ts) {
      const h = new Date(ts).getHours(); // local time
      hourCount[h]++;
    }
  });
  const maxHour = hourCount.indexOf(Math.max(...hourCount));

  // Longest streak of active days
  let streak = 0, maxStreak = 0, cur = 0;
  const activeDates = new Set(D.daily.map(d => d.period));
  const sortedDates = [...activeDates].sort();
  sortedDates.forEach((d, i) => {
    if (i === 0) { cur = 1; return; }
    const prev = new Date(sortedDates[i-1] + 'T00:00:00Z');
    const curr = new Date(d + 'T00:00:00Z');
    const diff = (curr - prev) / 86400000;
    cur = diff === 1 ? cur + 1 : 1;
    maxStreak = Math.max(maxStreak, cur);
  });
  maxStreak = Math.max(maxStreak, cur);

  // Avg session cost by hour
  const hourCost = Array(24).fill(0);
  D.session.forEach(s => {
    const ts = s.metadata?.lastActivity;
    if (ts) { hourCost[new Date(ts).getHours()] += s.totalCost; }
  });
  const maxCostHour = hourCost.indexOf(Math.max(...hourCost));

  // KPIs
  document.getElementById('pat-kpis').innerHTML = [
    { label: 'Most Active Day', value: DAYS[maxDow], sub: fmt(dowCost[maxDow]) + ' total', cls: '' },
    { label: 'Peak Hour', value: maxHour + ':00', sub: `${hourCount[maxHour]} sessions`, cls: '' },
    { label: 'Longest Streak', value: maxStreak + ' days', sub: 'consecutive active days', cls: '' },
    { label: 'Priciest Hour', value: maxCostHour + ':00', sub: fmt(hourCost[maxCostHour]) + ' spent', cls: 'watch' },
  ].map(k => `<div class="verdict-card ${k.cls}"><div class="label">${k.label}</div><div class="value">${k.value}</div><div class="sub">${k.sub}</div></div>`).join('');

  document.getElementById('pat-narrative').textContent =
    `You code most on ${DAYS[maxDow]}s. Most sessions end around ${maxHour}:00 local time. Your most expensive sessions happen around ${maxCostHour}:00.`;

  // Weekday chart
  new Chart(document.getElementById('weekdayChart'), {
    type: 'bar',
    data: {
      labels: DAYS,
      datasets: [
        { label: 'Total Cost', data: dowCost, backgroundColor: 'rgba(0,212,170,0.7)', borderRadius: 6, yAxisID: 'y' },
        { label: 'Sessions', data: dowCount, backgroundColor: 'rgba(99,102,241,0.5)', borderRadius: 6, yAxisID: 'y2', type: 'bar' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#64748b', boxWidth: 12 } } },
      scales: {
        x: { grid: { color: '#2d3148' }, ticks: { color: '#64748b' } },
        y: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', callback: v => '$'+v }, position: 'left' },
        y2: { grid: { display: false }, ticks: { color: '#64748b' }, position: 'right' }
      }
    }
  });

  // Hour chart
  new Chart(document.getElementById('hourChart'), {
    type: 'bar',
    data: {
      labels: Array.from({length:24}, (_,i) => i+':00'),
      datasets: [{ label: 'Sessions', data: hourCount, backgroundColor: 'rgba(245,158,11,0.7)', borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', maxTicksLimit: 12 } },
        y: { grid: { color: '#2d3148' }, ticks: { color: '#64748b' } }
      }
    }
  });

  // Calendar heatmap (CSS grid)
  if (!D.daily.length) {
    document.getElementById('heatmapContainer').innerHTML = '<p class="no-data">No daily data available.</p>';
  } else {
  const costs = D.daily.map(d => d.totalCost);
  const maxCost = Math.max(...costs);
  const costsMap = Object.fromEntries(D.daily.map(d => [d.period, d.totalCost]));

  // Build calendar from first day to last
  const first = new Date(D.daily[0].period + 'T00:00:00Z');
  const last = new Date(D.daily[D.daily.length-1].period + 'T00:00:00Z');
  // Align to Sunday
  const calStart = new Date(first);
  calStart.setUTCDate(first.getUTCDate() - first.getUTCDay());
  const calEnd = new Date(last);
  calEnd.setUTCDate(last.getUTCDate() + (6 - last.getUTCDay()));

  const cells = [];
  const calCur = new Date(calStart);
  while (calCur <= calEnd) {
    const dateStr = calCur.toISOString().slice(0,10);
    const cost = costsMap[dateStr];
    const intensity = cost ? cost / maxCost : 0;
    const r = Math.round(15 + intensity * 224);
    const g = Math.round(17 + intensity * 51);
    const b = Math.round(23 - intensity * 23 + intensity * 68);
    const bg = cost ? `rgb(${Math.round(intensity*239+(1-intensity)*26)},${Math.round(intensity*68+(1-intensity)*29)},${Math.round(intensity*68+(1-intensity)*39)})` : '#1a1d27';
    cells.push(`<div title="${dateStr}${cost ? ': '+fmt(cost) : ''}" style="width:18px;height:18px;border-radius:3px;background:${bg};cursor:default" onmouseover="this.style.outline='1px solid #00d4aa'" onmouseout="this.style.outline='none'"></div>`);
    calCur.setUTCDate(calCur.getUTCDate() + 1);
  }

  document.getElementById('heatmapContainer').innerHTML = `
    <div style="display:inline-flex;gap:2px;flex-direction:column;min-width:max-content">
      <div style="display:flex;gap:4px;margin-bottom:4px;font-size:0.7rem;color:var(--muted)">
        ${DAYS.map(d => `<div style="width:18px;text-align:center">${d[0]}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,20px);grid-auto-rows:20px;gap:2px">
        ${cells.join('')}
      </div>
    </div>
    <div style="margin-top:0.75rem;font-size:0.75rem;color:var(--muted)">
      Low cost <span style="display:inline-flex;gap:2px;vertical-align:middle">
        ${[0.1,0.3,0.5,0.7,0.9].map(i=>`<span style="display:inline-block;width:14px;height:14px;border-radius:2px;background:rgb(${Math.round(i*239+(1-i)*26)},${Math.round(i*68+(1-i)*29)},${Math.round(i*68+(1-i)*39)})"></span>`).join('')}
      </span> High cost (max: ${fmt(maxCost)})
    </div>`;
  } // end heatmap guard

  // Session scatter
  new Chart(document.getElementById('scatterChart'), {
    type: 'bubble',
    data: {
      datasets: [{
        label: 'Sessions',
        data: D.session.map(s => ({
          x: s.totalTokens / 1000,
          y: s.totalCost,
          r: Math.max(3, Math.min(20, s.outputTokens / 5000)),
        })),
        backgroundColor: D.session.map(s => s.totalCost > 20 ? 'rgba(239,68,68,0.6)' : s.totalCost > 5 ? 'rgba(245,158,11,0.6)' : 'rgba(0,212,170,0.5)'),
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const s = D.session[ctx.dataIndex];
              const date = s.metadata?.lastActivity?.slice(0,10) ?? '?';
              return [`Cost: ${fmt(s.totalCost)}`, `Tokens: ${(s.totalTokens/1000).toFixed(0)}k`, `Date: ${date}`];
            }
          }
        }
      },
      scales: {
        x: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', callback: v => v+'k' }, title: { display: true, text: 'Total Tokens (k)', color: '#64748b' } },
        y: { grid: { color: '#2d3148' }, ticks: { color: '#64748b', callback: v => '$'+v }, title: { display: true, text: 'Cost ($)', color: '#64748b' } }
      }
    }
  });
})();
  </script>
</body>
</html>
